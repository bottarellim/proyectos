<style>
*{box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;margin:0;background:linear-gradient(160deg,#1e3a6e 0%,#254282 60%,#1a3060 100%);min-height:100vh;color:#1f2937;font-size:13px}

/* === Login === */
#login-screen{position:fixed;inset:0;background:transparent;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:48px 40px;width:360px;text-align:center}
.login-box h2{margin:0 0 4px;font-size:28px;color:#1e3a6e;font-weight:800;letter-spacing:-.5px}
.login-box p{color:#6b7280;font-size:13px;margin:0 0 28px}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit;transition:border-color .2s}
.login-box input:focus{border-color:#305496;box-shadow:0 0 0 4px rgba(48,84,150,.08)}
.login-box button.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#305496,#3b6fd4);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit;letter-spacing:.02em;transition:opacity .2s,transform .1s}
.login-box button.btn-login:hover{opacity:.92;transform:translateY(-1px)}
.login-box button.btn-login:active{transform:translateY(0)}
.login-box button.btn-login:disabled{background:#9ca3af;cursor:not-allowed;transform:none}
#l-err{color:#dc2626;font-size:12px;margin-top:10px;min-height:18px}

/* === App === */
#app{display:none;max-width:1140px;margin:0 auto;padding:0}
.app-header{background:linear-gradient(135deg,#1e3a6e 0%,#305496 100%);padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(30,58,110,.3)}
.topbar{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.topbar-logo{font-size:20px;font-weight:800;color:#fff;margin:0;flex-shrink:0;letter-spacing:-.3px}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,.7);flex:1}
.breadcrumb a{color:#93c5fd;cursor:pointer;font-weight:500;text-decoration:none}
.breadcrumb a:hover{color:#fff}
.breadcrumb .sep{color:rgba(255,255,255,.3)}
.breadcrumb .cur{color:#fff;font-weight:600}
.user-pill{background:rgba(255,255,255,.15);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;margin-right:3px;flex-shrink:0;box-shadow:0 0 4px #10b981}
.sync-dot.off{background:rgba(255,255,255,.3);box-shadow:none}
button.btn-logout{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;transition:background .15s}
button.btn-logout:hover{background:rgba(220,38,38,.4)}
.app-content{padding:16px 24px;min-height:calc(100vh - 60px)}

/* === Acciones === */
.actbar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
button{padding:7px 14px;border:1px solid #305496;background:#305496;color:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .15s}
button:hover{opacity:.88;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.sec{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25);box-shadow:none}
button.add-main{background:linear-gradient(135deg,#10b981,#059669);border-color:#059669;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(16,185,129,.3)}
button.del{background:#fff;color:#991b1b;border:1px solid #fca5a5;padding:3px 7px;font-size:11px;box-shadow:none}
button.add{background:#fff;color:#065f46;border:1px solid #6ee7b7;font-size:11px;margin:3px 3px 3px 0;box-shadow:none}
button.btn-sub{background:#f0f9ff;color:#0369a1;border:1px solid #7dd3fc;padding:2px 6px;font-size:10px;border-radius:4px;box-shadow:none}
button.btn-adj{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;font-size:11px;padding:2px 8px;border-radius:5px;box-shadow:none}
.saved{color:#6ee7b7;font-size:12px;margin-left:4px;font-weight:600}

/* === Filtros === */
.filtros{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.filtros input,.filtros select{padding:7px 10px;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:12px;background:rgba(255,255,255,.12);color:#fff;outline:none;font-family:inherit;backdrop-filter:blur(4px)}
.filtros input::placeholder{color:rgba(255,255,255,.6)}
.filtros input:focus,.filtros select:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.18)}
.filtros select option{background:#254282;color:#fff}
.filtros input{width:230px}
#filtroCount{font-size:12px;color:rgba(255,255,255,.7)}

/* === Lista compacta === */
.lista-c{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(30,58,110,.12);overflow:hidden}
.it-wrap{border-bottom:1px solid #f0f4f8;transition:box-shadow .2s}
.it-wrap:last-child{border-bottom:none}
.it-wrap:hover{box-shadow:0 2px 12px rgba(48,84,150,.08)}

.it-row{display:flex;align-items:center;gap:7px;padding:0 14px 0 0;cursor:pointer;transition:background .15s;min-height:44px;position:relative}
.it-row:hover{background:#f5f8ff}
.it-row.it-open{background:#eff6ff}
.it-row.it-open::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#305496;border-radius:0 2px 2px 0}

.it-strip{width:5px;min-height:44px;flex-shrink:0;align-self:stretch;border-radius:0;transition:background .2s}
.it-row.it-open .it-strip{background:#305496}

.it-arrow{font-size:10px;color:#c0cce0;transition:transform .2s,color .2s;flex-shrink:0;padding:0 4px}

input.nm-c{flex:1;min-width:0;font-size:13px;font-weight:500;background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 8px;color:#1e3a6e;font-family:inherit;transition:all .15s}

.it-row.it-open input.nm-c{font-weight:700;color:#1e3a6e}

.it-meta{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.it-pct{font-size:11px;color:#94a3b8;white-space:nowrap;min-width:52px;text-align:right;font-weight:500}
.it-fecha{font-size:10px;color:#10b981;white-space:nowrap;font-weight:600}
.it-del{opacity:0.25;transition:opacity .15s;transform:scale(1)}
.it-row:hover .it-del{opacity:1}
.it-body{padding:10px 18px 16px;background:#f8fbff;border-top:1px solid #dbeafe;border-left:3px solid #305496}
.it-body-c{padding:10px 18px 14px;background:#f8fbff;border-top:1px solid #dbeafe;border-left:3px solid #305496}
.it-count{font-size:11px;color:#305496;background:#dbeafe;border-radius:10px;padding:2px 9px;font-weight:600}

/* === Badges === */
select.est-trabajo{border:none;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;outline:none;max-width:175px;font-family:inherit}
select.est-abono{border:none;border-radius:12px;padding:2px 7px;font-size:11px;font-weight:700;cursor:pointer;outline:none;font-family:inherit}
select.est-cliente{border:none;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;outline:none;font-family:inherit}
.abono-Con{background:#d1fae5;color:#065f46}
.abono-Sin{background:#f1f5f9;color:#64748b}
.etj-SinIniciar{background:#dbeafe;color:#1e40af}
.etj-Gris{background:#e5e7eb;color:#374151}
.etj-Iniciado{background:#e0f2fe;color:#0369a1}
.etj-Presupuestado{background:#ede9fe;color:#5b21b6}
.etj-Aprobado{background:#dcfce7;color:#15803d}
.etj-IniciadoSinAprobar{background:#fef9c3;color:#854d0e}
.etj-AvanzadoFaltaTerminar{background:#fed7aa;color:#9a3412}
.etj-Terminado{background:#d1fae5;color:#065f46}
.etj-Cobrado{background:#ccfbf1;color:#0f766e}
.ec-Activo{background:#d1fae5;color:#065f46}

.ec-Inactivo{background:#e5e7eb;color:#374151}

/* === Nota === */
.nota-box{background:#fefce8;border-left:3px solid #fbbf24;border-radius:4px;padding:5px 10px;margin:4px 0 8px}
.nota-box textarea{width:100%;background:transparent;border:1px solid transparent;font-size:12px;color:#78350f;font-family:inherit;padding:2px 4px;border-radius:4px;resize:vertical;min-height:22px}
.nota-box textarea:hover,.nota-box textarea:focus{border-color:#fbbf24;background:#fffbeb;outline:none}

/* === Adjuntos === */
.adj-section{margin:4px 0 8px}
.adj-title{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.adj-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.adj-item{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:3px 8px;font-size:11px}
.adj-item a{color:#305496;text-decoration:none;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.adj-item a:hover{text-decoration:underline}
.adj-del-btn{color:#9ca3af;cursor:pointer;padding:0 2px;font-size:11px}
.adj-del-btn:hover{color:#dc2626}
.adj-upload-inp{display:none}
.adj-uploading{color:#6b7280;font-size:11px;font-style:italic}

/* === Toggle Tareas === */
.tareas-toggle{display:inline-flex;align-items:center;gap:5px;margin:6px 0 2px;font-size:11px;font-weight:600;color:#374151;cursor:pointer;padding:3px 10px;border-radius:4px;background:#e5e7eb;user-select:none}
.tareas-toggle:hover{background:#d1d5db}
.t-arrow{font-size:9px;transition:transform .18s;display:inline-block}
.tareas-toggle.t-open .t-arrow{transform:rotate(90deg)}

/* === Árbol de tareas === */
.tree{margin:2px 0 4px}
.node{position:relative;padding:0 0 0 12px;border-left:2px solid #e2e8f0;margin-left:5px}
.node:before{content:"";position:absolute;left:-2px;top:12px;width:10px;height:2px;background:#e2e8f0}
.node:last-child{border-left-color:transparent}
.node:last-child:before{background:#e2e8f0}
.node.task,.node.subtask{display:flex;align-items:center;gap:3px;padding:1px 2px 1px 10px;border-radius:2px}
.node.task:hover,.node.subtask:hover{background:#f1f5f9}
.node.task{font-size:11px}
.node.subtask{margin-left:5px;font-size:11px;color:#475569}
.tree-id{color:#cbd5e1;font-size:10px;min-width:14px;font-weight:600}
.tree-tx{flex:1;min-width:0}
.tree-tx textarea{width:100%;border:none;background:transparent;font-size:11px;font-family:inherit;padding:1px 3px;border-radius:2px;color:#1f2937;resize:none;height:20px;line-height:18px;overflow:hidden;white-space:nowrap}
.tree-tx textarea:hover,.tree-tx textarea:focus{background:#fff;outline:1px solid #d1d5db;height:auto;white-space:normal;overflow:auto}
.tree-meta{display:flex;gap:2px;align-items:center;flex-shrink:0}
.tree-meta select{padding:1px 3px;font-size:10px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;font-family:inherit}
.tree-meta button{padding:1px 4px;font-size:10px}
.tree-chk{margin:0;flex-shrink:0}
.task-adj-mini{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.task-adj-chip{display:inline-flex;align-items:center;gap:3px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:4px;padding:1px 5px;font-size:10px}
.task-adj-chip a{color:#0369a1;text-decoration:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}

/* === Subpuntos === */
.subp-node{margin:5px 0 5px 6px;padding:5px 0 3px 10px;border-left:3px solid #3b82f6;border-radius:0 5px 5px 0;background:#f8fafc}
.subp-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.subp-head input{flex:1;font-size:13px;color:#1e40af;border:1px solid transparent;background:transparent;padding:3px 5px;border-radius:4px;font-weight:600;font-family:inherit}
.subp-head input:hover,.subp-head input:focus{border-color:#cbd5e1;background:#fff;outline:none}
.toggle-sp{cursor:pointer;user-select:none;color:#64748b;font-size:11px}
.toggle-sp.col{transform:rotate(-90deg);display:inline-block}
.collapsed-ch{display:none}

/* === Empty === */
.empty{text-align:center;padding:48px 20px;color:#9ca3af}
.empty-icon{font-size:40px;margin-bottom:8px}


/* === Botón guardar manual === */
button.btn-save{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;padding:2px 7px;font-size:11px;border-radius:5px;box-shadow:none;font-weight:700;transition:all .15s}
button.btn-save:hover{background:#059669;color:#fff;border-color:#059669}
button.btn-save.guardado{background:#059669;color:#fff;border-color:#059669}

/* === Reconexión === */
.sync-dot{cursor:pointer}
.sync-label{font-size:11px;color:rgba(255,255,255,.6);margin-left:2px;white-space:nowrap}
.sync-label.err{color:#fca5a5;font-weight:600}
/* === Lightbox === */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:4px}
</style>

<script>
// ============================================================
// CONFIGURACIÓN SUPABASE
// ============================================================
const SUPABASE_URL = 'https://ftpcqmzgpvzhwrckqlii.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wNpK1pS7uhnHKp9AOEzskA_5j8U9dD6';
// ============================================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('l-err');
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){err.textContent='Completá email y contraseña.';return;}
  btn.textContent='Ingresando...';btn.disabled=true;err.textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    err.textContent=error.message.includes('Invalid')?'Email o contraseña incorrectos':error.message;
    btn.textContent='Ingresar';btn.disabled=false;
  }
}

async function doLogout(){
  await sb.auth.signOut();
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-email').textContent=session.user.email;
    subscribeRealtime();
    await initData();
  }
  if(event==='SIGNED_OUT'){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    document.getElementById('l-btn').textContent='Ingresar';
    document.getElementById('l-btn').disabled=false;
  }
});

// ============================================================
// CONSTANTES
// ============================================================
const ESTADOS_CLIENTE=['Activo','Potencial','Inactivo','Suspendido'];
const EC_CLASS={Activo:'ec-Activo',Potencial:'ec-Potencial',Inactivo:'ec-Inactivo',Suspendido:'ec-Suspendido'};
const GRUPOS_TRABAJO=[
  {g:'— Común —',e:['Sin Iniciar','En Relevamiento']},
  {g:'— Camino 1: Con Presupuesto —',e:['Presupuestado','Esperando Aprobación','En Ejecución','Avanzado','Terminado','Facturar','Cobrado']},
  {g:'— Camino 2: De Palabra —',e:['Aprobado de Palabra','En Ejecución sin Presupuesto','Avanzado sin Presupuesto','Terminado sin Presupuesto','Presupuestar','Aprobar','Facturar','Cobrado']}
];

const COLOR_HEX={amarillo:'#f59e0b',rojo:'#dc2626',verde:'#10b981',violeta:'#7c3aed',gris:'#475569',celeste:'#0ea5e9',naranja:'#f97316',turquesa:'#0d9488',esmeralda:'#059669'};

// ============================================================

let clientes=[];

function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function fixClientes(arr){
  if(!Array.isArray(arr))return[];
  arr.forEach(c=>{
    if(!c.id)c.id=newId();
    if(!c.estado)c.estado='Activo';
    if(!c.proyectos)c.proyectos=[];
    c.proyectos.forEach(p=>{
      if(!p.id)p.id=newId();
      if(!p.adjuntos)p.adjuntos=[];
      if(!p.tareas)p.tareas=[];
      if(!p.subpuntos)p.subpuntos=[];
      p.tareas.forEach(t=>{if(!t.adjuntos)t.adjuntos=[];if(!t.subtareas)t.subtareas=[];t.subtareas.forEach(st=>{if(!st.adjuntos)st.adjuntos=[];});});
      p.subpuntos.forEach(s=>{if(!s.id)s.id=newId();if(!s.tareas)s.tareas=[];s.tareas.forEach(t=>{if(!t.adjuntos)t.adjuntos=[];if(!t.subtareas)t.subtareas=[];t.subtareas.forEach(st=>{if(!st.adjuntos)st.adjuntos=[];});});});
    });
  });
  return arr;
}

function migrarDesdeFormatoViejo(viejos){
  const c={id:newId(),nombre:'Ciaber',estado:'Activo',nota:'',color:null,proyectos:[]};
  c.proyectos=viejos.map(p=>({
    id:newId(),nombre:p.nombre||'',estadoTrabajo:p.estadoTrabajo||'Sin Iniciar',abono:p.abono||'Sin Abono',
    color:p.color||null,nota:p.nota||'',adjuntos:[],fechaTerminado:p.fechaTerminado||null,
    tareas:(p.tareas||[]).map(t=>({id:t.id,tarea:t.tarea||'',estado:t.estado||'Pendiente',prioridad:t.prioridad||'',adjuntos:[],subtareas:(t.subtareas||[]).map(st=>({id:st.id,tarea:st.tarea||'',estado:st.estado||'Pendiente',prioridad:st.prioridad||'',adjuntos:[]}))})),
    subpuntos:(p.subpuntos||[]).map(s=>({id:newId(),nombre:s.nombre||'',desc:s.desc||'',tareas:(s.tareas||[]).map(t=>({id:t.id,tarea:t.tarea||'',estado:t.estado||'Pendiente',prioridad:t.prioridad||'',adjuntos:[],subtareas:(t.subtareas||[]).map(st=>({id:st.id,tarea:st.tarea||'',estado:st.estado||'Pendiente',prioridad:st.prioridad||'',adjuntos:[]}))}))}))}));
  return [c];
}

async function initData(retryN=0){
  // En el primer intento: mostrar datos locales YA para que la UI no quede en blanco
  if(retryN===0){
    const local=localStorage.getItem('ciaber_v2');
    if(local){
      try{const d=JSON.parse(local);if(d.clientes?.length){clientes=fixClientes(d.clientes);renderVista();}}catch(e){}
    }
    setSyncDot(false,'Conectando...');
  }
  try{
    const {data:row,error}=await sb.from('app_data').select('clientes').eq('id',1).single();
    if(error)throw error;
    if(row?.clientes&&row.clientes.length>0){
      clientes=fixClientes(row.clientes);
    } else {
      // Primera vez — intentar migrar desde localStorage
      const local=localStorage.getItem('ciaber_puntos_v3');
      const localV2=localStorage.getItem('ciaber_v2');
      if(localV2){
        try{const d=JSON.parse(localV2);clientes=fixClientes(d.clientes||[]);}catch(e){}
      } else if(local){
        try{clientes=migrarDesdeFormatoViejo(JSON.parse(local));}catch(e){}
      }
      if(!clientes.length){clientes=[{id:newId(),nombre:'Ciaber',estado:'Activo',nota:'',color:null,proyectos:[]}];}
      await saveToSupabase();
    }
    localStorage.setItem('ciaber_v2',JSON.stringify({clientes}));
    _confirmedJson=JSON.stringify(clientes);
    setSyncDot(true);
    renderVista();
  }catch(e){
    console.error('Error cargando datos:',e);
    if(retryN<5){
      const delay=Math.min((retryN+1)*2000,10000);
      setSyncDot(false,'Reintentando ('+(retryN+1)+'/5)...');
      setTimeout(()=>initData(retryN+1),delay);
    } else {
      setSyncDot(false,'Sin conexión');
      showSaved('⚠ Sin conexión — datos locales');
    }
  }
}

async function saveToSupabase(){
  if(_saving){_pendingSave=true;return;}
  _saving=true;
  const ts=new Date().toISOString();
  _ownTimestamps.add(ts);
  try{
    await sb.from('app_data').upsert({id:1,clientes,updated_at:ts});
    localStorage.setItem('ciaber_v2',JSON.stringify({clientes}));
    _confirmedJson=JSON.stringify(clientes);
  }catch(e){
    console.error('Error guardando:',e);
    showSaved('⚠ Error al guardar');
    _ownTimestamps.delete(ts);
  }
  _saving=false;
  if(_pendingSave){_pendingSave=false;await saveToSupabase();}
}

function save(){
  showSaved('⏳ Guardando...');
  saveToSupabase().then(()=>showSaved('✓ Guardado '+new Date().toLocaleTimeString()));
}

function showSaved(msg){
  const s=document.getElementById('saved');
  if(!s)return;
  s.textContent=msg;
  clearTimeout(window._st);
  if(!msg.startsWith('⏳'))window._st=setTimeout(()=>s.textContent='',2500);
}

function setSyncDot(on,msg){
  const d=document.getElementById('sync-dot');
  const l=document.getElementById('sync-label');
  if(d)d.className='sync-dot'+(on?'':' off');
  if(l){l.textContent=msg||(on?'':'Sin conexión');l.className='sync-label'+(on?'':' err');}
}

let _rtChannel=null;
let _rtRetryCount=0;
let _rtRetryTimer=null;
function subscribeRealtime(){
  clearTimeout(_rtRetryTimer);
  if(_rtChannel){try{sb.removeChannel(_rtChannel);}catch(e){}}
  _rtChannel=sb.channel('app_rt_'+Date.now())
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'app_data'},payload=>{
      if(!payload.new?.clientes)return;
      const ts=payload.new?.updated_at;
      if(ts&&_ownTimestamps.has(ts)){_ownTimestamps.delete(ts);return;}
      if(_saving||_pendingSave)return;
      const prevClientId=clienteActual!=null?clientes[clienteActual]?.id:null;
      pushHistory();
      clientes=fixClientes(payload.new.clientes);
      _confirmedJson=JSON.stringify(clientes);
      localStorage.setItem('ciaber_v2',JSON.stringify({clientes}));
      if(prevClientId&&vistaActual==='proyectos'){
        const newIdx=clientes.findIndex(c=>c.id===prevClientId);
        if(newIdx>=0)clienteActual=newIdx;
        else{clienteActual=null;vistaActual='clientes';}
      }
      renderVista();
      showSaved('⟳ Actualizado');
    })
    .subscribe(status=>{
      const ok=status==='SUBSCRIBED';
      setSyncDot(ok, ok?'': status==='TIMED_OUT'?'Timeout':'Sin conexión');
      if(!ok&&status!=='SUBSCRIBING'){
        const delay=Math.min(_rtRetryCount*5000+5000,30000);
        _rtRetryCount++;
        setSyncDot(false,'Reintentando...');
        _rtRetryTimer=setTimeout(subscribeRealtime,delay);
      } else if(ok){
        _rtRetryCount=0;
      }
    });
}
async function reconectar(){
  setSyncDot(false,'Reconectando...');
  _rtRetryCount=0;
  subscribeRealtime();
  await initData();
}

async function handleUpload(event,refTipo,refId,adjArr){
  const file=event.target.files[0];
  if(!file)return;
  event.target.value='';
  const MAX=50*1024*1024;
  if(file.size>MAX){alert('Archivo muy grande (máx 50MB).');return;}
  showSaved('⏳ Subiendo archivo...');
  const ext=file.name.split('.').pop();
  const path=`${refTipo}/${refId}/${newId()}.${ext}`;
  const {error}=await sb.storage.from('archivos').upload(path,file,{contentType:file.type,upsert:false});
  if(error){showSaved('⚠ Error subiendo archivo');console.error(error);return;}
  adjArr.push({id:newId(),nombre:file.name,storage_path:path,tipo_mime:file.type});
  await saveToSupabase();
  showSaved('✓ Archivo subido');
  renderVista();
}

async function openFile(storagePath){
  showSaved('⏳ Abriendo...');
  const {data,error}=await sb.storage.from('archivos').createSignedUrl(storagePath,3600);
  if(error||!data?.signedUrl){showSaved('⚠ Error abriendo archivo');return;}
  showSaved('');
  window.open(data.signedUrl,'_blank');
}

async function delArchivo(adjArr,idx){
  const adj=adjArr[idx];
  if(!adj)return;
  if(!confirm(`¿Eliminar "${adj.nombre}"?`))return;
  if(adj.storage_path){
    await sb.storage.from('archivos').remove([adj.storage_path]);
  }
  adjArr.splice(idx,1);
  save();renderVista();
}

function icono(mime){
  if(!mime)return'📎';
  if(mime.startsWith('image'))return'🖼️';
  if(mime.includes('pdf'))return'📄';
  if(mime.includes('word')||mime.includes('document'))return'📝';
  if(mime.includes('sheet')||mime.includes('excel'))return'📊';
  return'📎';
}

function renderAdjuntos(adjuntos,refTipo,refId,adjArrPath,label){
  const uploadId='up_'+refId;
  const items=(adjuntos||[]).map((a,i)=>`
    <div class="adj-item">
      <span>${icono(a.tipo_mime)}</span>
      <a onclick="openFile('${a.storage_path}')" title="${ESC(a.nombre)}">${ESC(a.nombre)}</a>
      <span class="adj-del-btn" onclick="${adjArrPath}.then(arr=>delArchivo(arr,${i}))">✕</span>
    </div>`).join('');
  return `<div class="adj-section">
    <div class="adj-title">📎 ${label||'Adjuntos'}
      <button class="btn-adj" onclick="document.getElementById('${uploadId}').click()">+ Adjuntar</button>
      <input type="file" id="${uploadId}" class="adj-upload-inp" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"
        onchange="${adjArrPath}.then(arr=>handleUpload(event,'${refTipo}','${refId}',arr))">
    </div>
    <div class="adj-list">${items}</div>
  </div>`;
}

const ESC=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const opt=(arr,v)=>arr.map(o=>`<option value="${o}"${o===v?' selected':''}>${o||'—'}</option>`).join('');
function optTrabajo(val){return GRUPOS_TRABAJO.map(g=>`<optgroup label="${g.g}">${g.e.map(e=>`<option value="${e}"${e===val?' selected':''}>${e}</option>`).join('')}</optgroup>`).join('');}

function getAdjArr(ci,pi,ti){
  return new Promise(resolve=>{
    if(ti!=null)resolve(clientes[ci].proyectos[pi].tareas[ti].adjuntos);
    else resolve(clientes[ci].proyectos[pi].adjuntos);
  });
}

function pctOf(arr){let t=0,h=0;arr.forEach(x=>{t++;if(x.estado==='Terminado')h++;(x.subtareas||[]).forEach(s=>{t++;if(s.estado==='Terminado')h++;});});return t?Math.round(h*100/t):0;}
function allTareasProy(p){if(p.subpuntos&&p.subpuntos.length)return p.subpuntos.flatMap(s=>s.tareas||[]);return p.tareas||[];}

function renderTareas(tareas,ci,pi,kind,si){
  const q=document.getElementById('q');
  const f=q?q.value.toLowerCase():'';
  let html=`<div class="tree">`;
  tareas.forEach((t,ti)=>{
    const vis=!f||t.tarea.toLowerCase().includes(f)||(t.subtareas||[]).some(st=>st.tarea.toLowerCase().includes(f));
    if(!vis)return;
    const base=kind==='s'?`${ci}|s|${pi}|${si}|${ti}`:`${ci}|t|${pi}|${ti}`;
    const refId=t.id||base;
    const adjPath=kind==='s'
      ?`Promise.resolve(clientes[${ci}].proyectos[${pi}].subpuntos[${si}].tareas[${ti}].adjuntos)`
      :`Promise.resolve(clientes[${ci}].proyectos[${pi}].tareas[${ti}].adjuntos)`;
    const adjMini=(t.adjuntos||[]).length?`<div class="task-adj-mini">${(t.adjuntos||[]).map(a=>`<div class="task-adj-chip"><span>${icono(a.tipo_mime)}</span><a onclick="openFile('${a.storage_path}')">${ESC(a.nombre)}</a></div>`).join('')}</div>`:'';
    const uploadId='tup_'+refId;
    html+=`<div class="node task" style="${t.estado==='Terminado'?'background:#d1fae5;border-left:2px solid #10b981':t.estado==='En proceso'?'background:#fff7ed;border-left:2px solid #f97316':''}">
      <span class="tree-id">${ESC(t.id)}</span>
      <div class="tree-tx">
        <textarea class="txt" data-path="${base}" data-k="tarea">${ESC(t.tarea)}</textarea>
        ${adjMini}
      </div>
      <div class="tree-meta">
        <select class="est" data-path="${base}" data-k="estado">${opt(ESTADOS,t.estado)}</select>
        <select class="pri" data-path="${base}" data-k="prioridad">${opt(PRIORIDADES,t.prioridad)}</select>
        <button class="btn-sub" onclick="document.getElementById('${uploadId}').click()" title="Adjuntar">📎</button>
        <input type="file" id="${uploadId}" class="adj-upload-inp" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt"
          onchange="${adjPath}.then(arr=>handleUpload(event,'tarea','${refId}',arr))">
        <button class="btn-save" onclick="guardarAhora(this)">✓</button>
        <button class="btn-sub" onclick="addSub('${base}')">+sub</button>
        <button class="del" onclick="delTarea('${base}')">✕</button>
      </div></div>`;
    if((t.subtareas||[]).length){
      html+=`<div style="margin-left:14px">`;
      t.subtareas.forEach((st,sti)=>{
        const spath=`${base}|${sti}`;
        html+=`<div class="node subtask" style="${st.estado==='Terminado'?'background:#d1fae5;border-left:2px solid #10b981':''}">
          <span class="tree-id">${ESC(st.id||'└')}</span>
          <div class="tree-tx"><textarea class="txt" data-path="${spath}" data-k="tarea">${ESC(st.tarea)}</textarea></div>
          <div class="tree-meta">
            <select class="est" data-path="${spath}" data-k="estado">${opt(ESTADOS,st.estado)}</select>
            <select class="pri" data-path="${spath}" data-k="prioridad">${opt(PRIORIDADES,st.prioridad)}</select>
            <button class="del" onclick="delSub('${spath}')">✕</button>
          </div></div>`;
      });
      html+=`</div>`;
    }
  });
  html+=`</div>`;
  const addPath=kind==='s'?`s|${ci}|${pi}|${si}`:`t|${ci}|${pi}`;
  html+=`<button class="add" onclick="addTarea('${addPath}')">+ Nueva tarea</button>`;
  return html;
}

        <input class="nm-c" data-path="${ci}|p|${pi}" data-k="nombre" value="${ESC(p.nombre)}" onclick="event.stopPropagation()">
        <div class="it-meta">
          <select class="est-trabajo ${ET_CLASS[p.estadoTrabajo||'Sin Iniciar']||'etj-SinIniciar'}" data-path="${ci}|p|${pi}" data-k="estadoTrabajo" onclick="event.stopPropagation()">${optTrabajo(p.estadoTrabajo||'Sin Iniciar')}</select>
          <select class="est-abono ${(p.abono||'Sin Abono')==='Abono'?'abono-Con':'abono-Sin'}" data-path="${ci}|p|${pi}" data-k="abono" onclick="event.stopPropagation()">${opt(OPCIONES_ABONO,p.abono||'Sin Abono')}</select>
          <span class="it-pct">${pct}% · ${total}t</span>
          ${p.fechaTerminado?`<span class="it-fecha">✓ ${p.fechaTerminado}</span>`:''}
          <button class="btn-save it-del" style="" onclick="event.stopPropagation();guardarAhora(this)" title="Guardar proyecto">✓</button>
          <button class="add it-del" style="font-size:10px;padding:2px 6px" onclick="event.stopPropagation();quickAddTarea(${ci},${pi})" title="Nueva tarea">+Tarea</button>
          <button class="add it-del" style="font-size:10px;padding:2px 6px;border-color:#bae6fd;color:#0369a1" onclick="event.stopPropagation();quickAddSub(${ci},${pi})" title="Nuevo subpunto">+Sub</button>
          <button class="del it-del" onclick="event.stopPropagation();delProyecto(${ci},${pi})">✕</button>
        </div>
      </div>
      <div class="it-body" style="display:none">${renderProyectoBody(p,ci,pi)}</div>
    </div>`;
  }).join('')}</div>`;
  bindEvents();
}

function abrirCliente(ci){vistaActual='proyectos';clienteActual=ci;renderVista();}
function volverClientes(){vistaActual='clientes';clienteActual=null;document.getElementById('filtroEstado').innerHTML='<option value="">📋 Todos los estados</option>';document.getElementById('filtroAbono').style.display='none';renderVista();}

// === Preservar estado expandido entre re-renders ===
const expandedKeys=new Set();

function restoreExpanded(){
  // Restaurar proyectos expandidos
  document.querySelectorAll('.it-wrap[data-ek]').forEach(w=>{
    if(expandedKeys.has(w.dataset.ek)){
      const row=w.querySelector('.it-row');
      const body=w.querySelector('.it-body');
      if(row) row.classList.add('it-open');
      if(body) body.style.display='block';
    }
  });
  // Restaurar toggles de tareas abiertos
  document.querySelectorAll('.tareas-toggle[data-tkey]').forEach(tog=>{
    if(expandedKeys.has(tog.dataset.tkey)){
      tog.classList.add('t-open');
      if(tog.nextElementSibling) tog.nextElementSibling.style.display='block';
    }
  });
}

function toggleExpand(ev){
  ev.stopPropagation();
  const wrap=ev.currentTarget.closest('.it-wrap');
  const row=wrap.querySelector('.it-row');
  const body=wrap.querySelector('.it-body');
  const isOpen=row.classList.contains('it-open');
  row.classList.toggle('it-open',!isOpen);
  if(body) body.style.display=isOpen?'none':'block';
  if(!isOpen) expandedKeys.add(wrap.dataset.ek);
  else expandedKeys.delete(wrap.dataset.ek);
}

function renderVista(){
  if(vistaActual==='proyectos'&&clienteActual!=null) renderProyectos(clienteActual);
  else renderClientes();
  restoreExpanded();
}

// ============================================================
// EVENTOS DE EDICIÓN
// ============================================================
function _onRootChange(ev){const t=ev.target;if(!t.dataset.path)return;applyEdit(t.dataset.path,t.dataset.k,t.value);save();renderVista();}
function _onRootInput(ev){const t=ev.target;if(!t.dataset.path||t.tagName==='SELECT')return;applyEdit(t.dataset.path,t.dataset.k,t.value);clearTimeout(window._it);window._it=setTimeout(save,8000);}
let _eventsBound=false;
function bindEvents(){
  if(_eventsBound)return;
  document.getElementById('root').addEventListener('change',_onRootChange);
  document.getElementById('root').addEventListener('input',_onRootInput);
  _eventsBound=true;
}
document.getElementById('q').oninput=renderVista;

function applyEdit(path,k,val){
  try{
    const p=path.split('|'),ci=+p[0],c=clientes[ci];if(!c)return;
    if(p[1]==='c'){if(k==='nombre'){c.nombre=val;}else if(k==='estadoCliente'){c.estado=val;}else if(k==='notaCliente'){c.nota=val;}return;}
    if(p[1]==='p'){const pi=+p[2],pr=c.proyectos[pi];if(!pr)return;
      if(k==='nombre')pr.nombre=val;
      else if(k==='nota')pr.nota=val;
      else if(k==='estadoTrabajo'){pr.estadoTrabajo=val;const col=ET_COLOR[val];if(col)pr.color=col;else delete pr.color;}
      else if(k==='abono')pr.abono=val;
      return;}
    if(p[1]==='sp'){const pi=+p[2],si=+p[3],s=c.proyectos[pi]?.subpuntos[si];if(!s)return;if(k==='nombreSub')s.nombre=val;else if(k==='descSub')s.desc=val;return;}
    if(p[1]==='t'){const pi=+p[2],ti=+p[3],t=c.proyectos[pi]?.tareas[ti];if(!t)return;if(p.length===4)t[k]=val;else if(p.length===5){const st=t.subtareas[+p[4]];if(st)st[k]=val;}return;}
    if(p[1]==='s'){const pi=+p[2],si=+p[3],ti=+p[4],t=c.proyectos[pi]?.subpuntos[si]?.tareas[ti];if(!t)return;if(p.length===5)t[k]=val;else if(p.length===6){const st=t.subtareas[+p[5]];if(st)st[k]=val;}return;}
  }catch(e){console.warn('applyEdit:',e.message);}
}

// ============================================================
// ACCIONES
// ============================================================

// ============================================================
// HISTORIAL / DESHACER
// ============================================================
function pushHistory(){
  _history.push(JSON.stringify({clientes:JSON.parse(JSON.stringify(clientes)),vistaActual,clienteActual}));
  if(_history.length>20)_history.shift();
  updateUndoBtn();
}
function undo(){
  if(!_history.length)return;
  const prev=JSON.parse(_history.pop());
  clientes=fixClientes(prev.clientes);
  vistaActual=prev.vistaActual;
  clienteActual=prev.clienteActual;
  updateUndoBtn();
  save();renderVista();
  showSaved('« Deshecho');
}
function updateUndoBtn(){
  const b=document.getElementById('btn-undo');
  if(b)b.style.display=_history.length?'':'none';
}


function guardarAhora(btn){
  clearTimeout(window._it);
  if(btn){btn.classList.add('guardado');btn.textContent='✓ Guardado';setTimeout(()=>{if(btn){btn.classList.remove('guardado');btn.textContent='✓'}},1500);}
  save();
}
function quickAddTarea(ci,pi){
  pushHistory();
  const p=clientes[ci].proyectos[pi];
  // Si hay subpuntos, agregar al último; si no, a tareas directas
  const arr=(p.subpuntos&&p.subpuntos.length)?p.subpuntos[p.subpuntos.length-1].tareas:p.tareas;
  const nid=(arr.length+1).toString().padStart(2,'0');
  arr.push({id:nid,tarea:'Nueva tarea',estado:'Pendiente',prioridad:'Media',adjuntos:[],subtareas:[]});
  expandedKeys.add('p-'+ci+'-'+pi);
  expandedKeys.add('tareas-'+ci+'-'+pi);
  save();renderVista();
  setTimeout(()=>{const txts=document.querySelectorAll('.tree .task textarea.txt');if(txts.length){const l=txts[txts.length-1];l.focus();l.select();}},60);
}
function quickAddSub(ci,pi){
  expandedKeys.add('p-'+ci+'-'+pi);
  addSubpunto(ci,pi);
}
function addItem(){
  pushHistory();
  if(vistaActual==='clientes'){
    clientes.push({id:newId(),nombre:'Nuevo Cliente',estado:'Activo',nota:'',color:null,proyectos:[]});
  } else {
    if(clienteActual==null)return;
    const ci=clienteActual;
    clientes[ci].proyectos.push({id:newId(),nombre:'Nuevo Proyecto',estadoTrabajo:'Sin Iniciar',abono:'Sin Abono',color:null,nota:'',adjuntos:[],fechaTerminado:null,tareas:[],subpuntos:[]});
    expandedKeys.add('p-'+ci+'-'+(clientes[ci].proyectos.length-1));
  }
  save();renderVista();
}
function delCliente(ci){if(!confirm(`¿Eliminar cliente "${clientes[ci].nombre}"?`))return;pushHistory();clientes.splice(ci,1);save();renderVista();}
function delProyecto(ci,pi){if(!confirm(`¿Eliminar proyecto "${clientes[ci].proyectos[pi].nombre}"?`))return;pushHistory();clientes[ci].proyectos.splice(pi,1);save();renderVista();}
function addSubpunto(ci,pi){
  pushHistory();
  const p=clientes[ci].proyectos[pi];if(!p.subpuntos)p.subpuntos=[];
  if(!p.subpuntos.length&&p.tareas&&p.tareas.length&&confirm('¿Mover tareas a subpunto "General"?')){p.subpuntos.push({id:newId(),nombre:'General',desc:'',tareas:p.tareas});p.tareas=[];}
  p.subpuntos.push({id:newId(),nombre:'Nuevo subpunto',desc:'',tareas:[]});save();renderVista();
}
function delSubpunto(ci,pi,si){const p=clientes[ci].proyectos[pi];if(!confirm(`¿Eliminar subpunto "${p.subpuntos[si].nombre}"?`))return;pushHistory();p.subpuntos.splice(si,1);if(!p.subpuntos.length)p.subpuntos=[];save();renderVista();}
function addTarea(addPath){
  pushHistory();
  const p=addPath.split('|'),ci=+p[1],pi=+p[2];
  const arr=p[0]==='s'?clientes[ci].proyectos[pi].subpuntos[+p[3]].tareas:clientes[ci].proyectos[pi].tareas;
  const nid=(arr.length+1).toString().padStart(2,'0');
  arr.push({id:nid,tarea:'Nueva tarea',estado:'Pendiente',prioridad:'Media',adjuntos:[],subtareas:[]});
  // Preserve expanded state explicitly before re-render
  expandedKeys.add(`p-${ci}-${pi}`);
  expandedKeys.add(`tareas-${ci}-${pi}`);
  save();
  renderVista();
  // Auto-focus the new task textarea
  setTimeout(()=>{
    const txts=document.querySelectorAll('.tree .task textarea.txt');
    if(txts.length){const last=txts[txts.length-1];last.focus();last.select();}
  },30);
}
function delTarea(path){
  const p=path.split('|'),ci=+p[0];
  let arr;
  if(p[1]==='t'){arr=clientes[ci].proyectos[+p[2]].tareas;if(!confirm(`¿Eliminar tarea?`))return;pushHistory();arr.splice(+p[3],1);}
  else if(p[1]==='s'){arr=clientes[ci].proyectos[+p[2]].subpuntos[+p[3]].tareas;if(!confirm(`¿Eliminar tarea?`))return;pushHistory();arr.splice(+p[4],1);}
  save();renderVista();
}
function addSub(path){
  pushHistory();
  const p=path.split('|'),ci=+p[0];
  let t;
  if(p[1]==='t')t=clientes[ci].proyectos[+p[2]].tareas[+p[3]];
  else if(p[1]==='s')t=clientes[ci].proyectos[+p[2]].subpuntos[+p[3]].tareas[+p[4]];
  if(!t)return;if(!t.subtareas)t.subtareas=[];
  t.subtareas.push({id:String.fromCharCode(97+t.subtareas.length),tarea:'Nueva subtarea',estado:'Pendiente',prioridad:'Media',adjuntos:[]});
  save();renderVista();
}
function delSub(path){
  const p=path.split('|'),ci=+p[0];
  let t;
  if(p[1]==='t')t=clientes[ci].proyectos[+p[2]].tareas[+p[3]];
  else if(p[1]==='s')t=clientes[ci].proyectos[+p[2]].subpuntos[+p[3]].tareas[+p[4]];
  if(t&&confirm('¿Eliminar subtarea?')){pushHistory();t.subtareas.splice(+p[p.length-1],1);}
  save();renderVista();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportJSON(){
  const blob=new Blob([JSON.stringify({clientes},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ciaber_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      pushHistory();
      if(d.clientes)clientes=fixClientes(d.clientes);
      else if(Array.isArray(d))clientes=migrarDesdeFormatoViejo(d);
      save();renderVista();alert('Importado correctamente.');
    }catch(err){alert('Archivo inválido: '+err.message);}
  };r.readAsText(f);
}
